config-version = 2

start-at-login = true
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'
after-startup-command = [
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0'
]

exec-on-workspace-change = [
  '/opt/homebrew/bin/sketchybar', '--trigger', 'aerospace_focus_change'
]

[mode.main.binding]
alt-h = 'focus left'
alt-l = 'focus right'
alt-j = 'focus down'
alt-k = 'focus up'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 0'

alt-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
alt-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
alt-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
alt-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
alt-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
alt-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
alt-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
alt-shift-8 = 'move-node-to-workspace --focus-follows-window 8'
alt-shift-9 = 'move-node-to-workspace --focus-follows-window 9'
alt-shift-0 = 'move-node-to-workspace --focus-follows-window 0'

alt-b = 'exec-and-forget $HOME/.local/bin/toggle_headphones'

alt-enter = 'exec-and-forget open -a Ghostty'
alt-shift-b = 'exec-and-forget open -a Brave\ Browser'
alt-w = 'close'
alt-shift-enter = 'exec-and-forget $HOME/.local/bin/remote-term'
